<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ONCE Specialty Coffee{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bulma CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            box-shadow: 0 2px 3px rgba(10, 10, 10, 0.1);
        }
        .footer {
            background: #111;
            color: #ccc;
            padding: 2rem 1.5rem;
            text-align: center;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar is-light" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
        <a class="navbar-item" href="/">
            <strong>ONCE</strong> ☕
        </a>
        <a role="button" class="navbar-burger" data-target="navMenu" aria-label="menu" aria-expanded="false">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
        </a>
    </div>

    <div id="navMenu" class="navbar-menu">
        <div class="navbar-start">
            <a class="navbar-item" href="/">Home</a>
            <a class="navbar-item" href="/shop">Shop</a>
            <a class="navbar-item" href="/about">About</a>
        </div>

        <div class="navbar-end">
            {% if session["user_id"] %}
                <a class="navbar-item" href="/logout">Log Out</a>
            {% else %}
                <a class="navbar-item" href="/login">Log In</a>
                <a class="navbar-item" href="/register">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Main Content -->
<section class="section">
    <div class="container">
        {% block main %}{% endblock %}
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    <p>&copy; 2025 ONCE Specialty Coffee & Roastery. All rights reserved.</p>
</footer>

<!-- JS for burger menu -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const burger = document.querySelector('.navbar-burger');
        const menu = document.getElementById(burger.dataset.target);
        burger.addEventListener('click', () => {
            burger.classList.toggle('is-active');
            menu.classList.toggle('is-active');
        });
    });
</script>

</body>
</html>
